<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Startup | A card game by Andrew Schauer</title>
  <meta name="description" content="Build your company to a billion-dollar valuation in this single-player engine-building card game. Raise cash, hire talent, and ship products.">

  <!-- Open Graph / Social -->
  <meta property="og:url" content="https://the-startup-game.vercel.app/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Startup | A card game by Andrew Schauer">
  <meta property="og:description" content="Hire talent. Ship products. Raise cash. Build a startup and find your billion-dollar exit.">
  <meta property="og:image" content="https://the-startup-game.vercel.app/og-image.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Startup | A card game by Andrew Schauer">
  <meta name="twitter:description" content="Hire talent. Ship products. Raise cash. Build a startup and find your billion-dollar exit.">
  <meta name="twitter:image" content="https://the-startup-game.vercel.app/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;600;700&family=Londrina+Shadow&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100dvh; background: #000000; overflow: hidden; }
    canvas { display: block; touch-action: none; }
    #rotate-prompt {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000000; z-index: 9999;
      justify-content: center; align-items: center;
    }
    @media (orientation: portrait) and (max-width: 1024px) {
      #rotate-prompt { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-prompt">
    <div style="text-align:center; color:#4ecdc4; font-family:Cabin,sans-serif;">
      <div style="font-size:48px; margin-bottom:16px;">&#x21BB;</div>
      <div style="font-size:20px;">Rotate your device to landscape</div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
